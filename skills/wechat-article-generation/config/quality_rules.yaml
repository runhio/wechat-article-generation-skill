# 文章质量评分规则

# 评分阈值
thresholds:
  excellent: 85
  pass: 70

# 评分维度
dimensions:
  # 1. 实用性（30分）
  practicality:
    weight: 30
    rules:
      - name: "有代码示例"
        keywords: ["```", "code", "python", "javascript", "示例代码"]
        score: 15
      - name: "有具体步骤"
        keywords: ["步骤", "第一步", "第二步", "step 1", "step 2", "首先", "然后"]
        score: 10
      - name: "有实际案例"
        keywords: ["案例", "例如", "比如", "实例", "example", "for instance"]
        score: 5

  # 2. 深度（25分）
  depth:
    weight: 25
    rules:
      - name: "字数充足"
        min_words: 2000
        score: 10
      - name: "有技术细节"
        keywords: ["原理", "机制", "算法", "架构", "实现", "architecture", "mechanism"]
        score: 10
      - name: "有对比分析"
        keywords: ["对比", "相比", "区别", "优势", "缺点", "vs", "compared to"]
        score: 5

  # 3. 结构（20分）
  structure:
    weight: 20
    rules:
      - name: "有引言"
        check: "first_paragraph_length"
        min_length: 50
        score: 5
      - name: "有小标题"
        min_count: 3
        score: 10
      - name: "有总结"
        keywords: ["总结", "结论", "最后", "综上", "conclusion", "summary"]
        score: 5

  # 4. 可读性（15分）
  readability:
    weight: 15
    rules:
      - name: "段落适中"
        max_length: 200
        score: 10
      - name: "有列表/表格"
        keywords: ["- ", "* ", "1. ", "2. ", "|"]
        score: 5

  # 5. 原创性（10分）
  originality:
    weight: 10
    rules:
      - name: "非简单翻译"
        avoid_keywords: ["根据原文", "原文指出", "according to", "translated from"]
        score: 5
      - name: "有独特见解"
        keywords: ["我认为", "值得注意", "关键在于", "建议", "推荐"]
        score: 5

# 扣分项
penalties:
  - name: "大量空话"
    keywords: ["随着AI的发展", "在当今时代", "众所周知", "不言而喻"]
    penalty: -5
    max_occurrences: 2

# 重试策略
retry:
  max_attempts: 2
